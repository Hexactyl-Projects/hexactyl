<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Hexagon background -->
  <polygon points="50,5 95,27.5 95,72.5 50,95 5,72.5 5,27.5" 
           fill="#f97316" 
           stroke="#ea580c" 
           stroke-width="2"/>
  
  <!-- Server/diamond icon -->
  <g transform="translate(50,48)">
    <!-- Diamond shape representing server node -->
    <polygon points="0,-20 15,0 0,20 -15,0" 
             fill="none" 
             stroke="#fff" 
             stroke-width="2"/>
    <!-- Inner dot -->
    <circle cx="0" cy="0" r="4" fill="#fff"/>
    <!-- Connection lines -->
    <line x1="-15" y1="0" x2="-25" y2="-10" stroke="#fff" stroke-width="1.5"/>
    <line x1="15" y1="0" x2="25" y2="-10" stroke="#fff" stroke-width="1.5"/>
    <line x1="0" y1="20" x2="0" y2="28" stroke="#fff" stroke-width="1.5"/>
    <!-- Node dots -->
    <circle cx="-25" cy="-10" r="2.5" fill="#fff"/>
    <circle cx="25" cy="-10" r="2.5" fill="#fff"/>
    <circle cx="0" cy="28" r="2.5" fill="#fff"/>
  </g>
  
  <!-- Subtle hex pattern overlay -->
  <polygon points="50,5 95,27.5 95,72.5 50,95 5,72.5 5,27.5" 
           fill="none" 
           stroke="#fbbf24" 
           stroke-width="1" 
           opacity="0.3"/>
</svg>